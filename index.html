<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noodle Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">

        <main class="calendar-section">

            <header class="calendar-header">
                <div class="view-toggles">
                    <button id="btn-week" class="active-view">Week</button>
                    <button id="btn-month">Month</button>
                </div>
                <div class="date-nav">
                    <button id="btn-today" title="Jump to today">Today</button>
                    <button id="btn-prev" class="nav-arrow" title="Previous">&lsaquo;</button>
                    <h2 id="current-date-label">Date Label</h2>
                    <button id="btn-next" class="nav-arrow" title="Next">&rsaquo;</button>
                    <button id="btn-export" title="Export tasks as JSON">⇩</button>
                    <button id="btn-import" title="Import tasks from JSON">⇧</button>
                    <input type="file" id="import-file" accept="application/json,.json" hidden>
                    <button id="btn-theme" title="Toggle theme">🌙</button>
                </div>
            </header>

            <div class="calendar-wrapper">
                <table id="week-view-table" class="planner-table">
                    <thead>
                        <tr id="week-header-row">
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="week-body"></tbody>
                </table>

                <table id="month-view-table" class="planner-table hidden">
                    <thead>
                        <tr>
                            <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                        </tr>
                    </thead>
                    <tbody id="month-body"></tbody>
                </table>
            </div>
        </main>

        <aside class="todo-section">
            <div class="sidebar-header">
                <h1 class="script-font">to do list</h1>
                <span id="task-count" class="task-count">0</span>
            </div>
            <ul id="todo-list-container" class="drop-zone"></ul>
        </aside>

        <section class="input-section">
            <div class="chatbox-container">
                <textarea id="task-input" placeholder="What's on your plate? (e.g. Finish design review)" rows="1"></textarea>
                <div class="controls">
                    <div class="duration-chips" id="duration-chips">
                        <button type="button" class="duration-chip" data-minutes="30">30m</button>
                        <button type="button" class="duration-chip active" data-minutes="60">1h</button>
                        <button type="button" class="duration-chip" data-minutes="90">1.5h</button>
                        <button type="button" class="duration-chip" data-minutes="120">2h</button>
                        <button type="button" class="duration-chip" data-minutes="180">3h</button>
                    </div>
                    <button id="submit-btn">Add task</button>
                </div>
                <div class="input-hint">Press <kbd>Enter</kbd> to add · <kbd>Shift</kbd>+<kbd>Enter</kbd> for newline</div>
            </div>
        </section>

    </div>

    <div id="edit-dialog" class="modal-backdrop hidden">
        <div class="modal">
            <header class="modal-header">
                <h3>Edit task</h3>
                <button class="modal-close" id="edit-close" title="Close">×</button>
            </header>
            <div class="modal-body">
                <label class="modal-checkbox">
                    <input type="checkbox" id="edit-completed">
                    <span>Mark complete</span>
                </label>

                <label class="modal-field">
                    <span>Task</span>
                    <input type="text" id="edit-text" maxlength="200">
                </label>

                <label class="modal-field">
                    <span>Duration</span>
                    <div class="duration-chips" id="edit-duration-chips">
                        <button type="button" class="duration-chip" data-minutes="30">30m</button>
                        <button type="button" class="duration-chip" data-minutes="60">1h</button>
                        <button type="button" class="duration-chip" data-minutes="90">1.5h</button>
                        <button type="button" class="duration-chip" data-minutes="120">2h</button>
                        <button type="button" class="duration-chip" data-minutes="180">3h</button>
                    </div>
                </label>

                <label class="modal-field">
                    <span>Notes</span>
                    <textarea id="edit-notes" rows="3" placeholder="Optional details…"></textarea>
                </label>
            </div>
            <footer class="modal-footer">
                <button id="edit-delete" class="btn-danger">Delete</button>
                <div class="spacer"></div>
                <button id="edit-cancel" class="btn-ghost">Cancel</button>
                <button id="edit-save" class="btn-primary">Save</button>
            </footer>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
